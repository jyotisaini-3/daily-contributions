name: Daily GitHub Contribution

on:
  schedule:
    - cron: '30 12 * * *'   # 12:30 UTC = 6:00 PM IST
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily log
        run: |
          echo "## $(date -u +'%Y-%m-%d %H:%M UTC') - Automated daily contribution" >> daily-log.md
          echo "Jyoti Saini - Maintaining consistent activity." >> daily-log.md
          echo "Research focus: Autonomous Intelligent Systems, Distributed AI & Accelerated Computing." >> daily-log.md

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-log.md
          git commit -m "Daily contribution - $(date -u +'%Y-%m-%d')" || echo "No changes"
          git push